<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه پیدا نشد | خانه ایده‌آل</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="preload" href="assets/fonts/vazirmatn-variable.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="css/style.css">
<style>

    min-height:100vh;
    display:flex;

<body>
  <div class="error-page">
    <img src="assets/img/logo-mark.svg" alt="" width="60" height="48">

    <p>ممکن است آدرس اشتباه وارد شده باشد یا صفحه مورد نظر جابه‌جا شده باشد.</p>
